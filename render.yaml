services:
  # Backend Web Service
  - type: web
    name: e-commerce-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: MONGO_URI
        sync: false # Set in Render Dashboard
      - key: JWT_SECRET
        sync: false # Set in Render Dashboard
      - key: CLOUDINARY_NAME
        sync: false # Set in Render Dashboard
      - key: CLOUDINARY_API_KEY
        sync: false # Set in Render Dashboard
      - key: CLOUDINARY_API_SECRET
        sync: false # Set in Render Dashboard
      - key: ADMIN_EMAIL
        sync: false # Set in Render Dashboard
      - key: ADMIN_PASSWORD
        sync: false # Set in Render Dashboard
      - key: FRONTEND_URL
        sync: false # Set to your frontend URL after it is created
      - key: ADMIN_URL
        sync: false # Set to your admin URL after it is created

  # Frontend Static Site
  - type: web
    name: e-commerce-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BACKEND_URL
        sync: false # Set to your backend URL

  # Admin Static Site
  - type: web
    name: e-commerce-admin
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: Admin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BACKEND_URL
        sync: false # Set to your backend URL
